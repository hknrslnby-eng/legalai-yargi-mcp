# NOT: Bu profil plandaki hazır şablonlardan değil, İYUK'un genel
# ilkelerinden (idari işlemin unsurları, dava süreleri) yola çıkılarak
# yazıldı. Bir idare hukuku uzmanının gözden geçirmesi önerilir
# (bkz. FORK-KAPSAMLI-PLAN.md §3.4 katkı çağrısı).
id: idare
name: İdare (Danıştay, Bölge İdare Mahkemeleri, İdare/Vergi Mahkemeleri)
version: 1

axes:
  - yetki                 # işlemi tesis eden makamın yetkili olup olmadığı
  - şekil                 # usul/şekil kurallarına uygunluk
  - sebep                 # işlemin hukuki/maddi sebebi
  - konu                  # işlemin doğurduğu hukuki sonuç
  - maksat                # kamu yararı/amaç unsuru (yetkinin amacına uygun kullanımı)

hierarchy:
  - DANISTAY_IBK              # Danıştay İçtihatları Birleştirme Kurulu
  - DAVA_DAIRELERI_KURULU     # Danıştay Dava Daireleri Kurulu
  - DAIRE                     # Danıştay Dairesi (numaralı)
  - BIM                       # Bölge İdare Mahkemesi (istinaf)
  - ILK_DERECE                # İdare/Vergi Mahkemesi

ratio_markers:
  - "sonuç olarak"
  - "bu nedenle"
  - "yerleşik içtihat"
  - "dairemizce"
dictum_markers:
  - "belirtmek gerekirse"
  - "ayrıca belirtilmelidir ki"
transfer_markers:
  - "davacı"
  - "davalı idare"
  - "idarece"
  - "bilirkişi raporunda"
  - "iddia edilmiştir"
  - "savunulmuştur"

dissent_headers:
  - "KARŞI OY"
  - "MUHALEFET ŞERHİ"

procedural_deadlines:
  iptal_davası: {days: 60, ref: "İYUK m.7"}
  itiraz: {days: 30, ref: "İYUK m.45"}
  temyiz: {days: 30, ref: "İYUK m.46"}

evidence_standard: "idari işlem ve eylemlerin hukuka uygunluğunun re'sen araştırma ilkesiyle denetimi"
expert_lenses:
  - idari_islem
  - idari_sozlesme
  - kamu_personeli
  - imar
  - duzenleyici_kurumlar
analysis_focus:
  - yetki
  - sekil
  - sebep
  - konu
  - maksat
  - iptal_tam_yargi
  - yurutmenin_durdurulmasi
system_prompt_persona: |
  İdare hukuku kıdemli avukatı, Danıştay İdari Dava Daireleri Kurulu perspektifi ve idare/idari yargılama usulü hukuku profesörü lensiyle çalış.
  Alt dallarda İDDK perspektifini koruyan ilgili Danıştay dairesinin kıdemli başkanı gibi analiz yap.
  İdari işlemin unsurlarını, başvuru yollarını, süreleri, görev-yetkiyi ve insan hakları etkisini kaynaklarıyla göster.
response_tone: "resmi, temkinli, atıf-odaklı"
disclaimer_required: true

id: hukuk
name: Hukuk (Özel Hukuk — Yargıtay Hukuk Daireleri, HGK, İBK)
version: 1

axes:
  - maddi_hukuk           # ilgili maddeler, tarafların hak ve yükümlülükleri
  - usul                  # HMK'ya uygunluk, yetki, görev, harç
  - ispat                 # deliller, ispat yükü, kanıt standardı: "kanaat"
  - zamanaşımı            # TBK 146 vd., özel süreler

hierarchy:                # yüksek → düşük
  - IBK                   # İçtihadı Birleştirme Kararı (bağlayıcı)
  - HGK                   # Hukuk Genel Kurulu
  - DAIRE                 # Hukuk Dairesi (numaralı)
  - BAM                   # Bölge Adliye Mahkemesi (istinaf)
  - ILK_DERECE

ratio_markers:            # ratio olma olasılığı yüksek kalıplar
  - "sonuç olarak"
  - "kabul edildiğine göre"
  - "yerleşik içtihat"
  - "dairemizce"
dictum_markers:           # dictum işaretleri
  - "belirtmek gerekirse"
  - "hemen ifade edelim ki"
transfer_markers:         # aktarım cümleleri — court_self değil
  - "ilk derece mahkemesi"
  - "davacı vekili"
  - "davalı"
  - "bilirkişi raporunda"
  - "iddia edilmiştir"
  - "savunulmuştur"

dissent_headers:
  - "KARŞI OY"
  - "MUHALEFET ŞERHİ"

procedural_deadlines:
  temyiz: {days: 15, ref: "HMK 361"}
  istinaf: {days: 14, ref: "HMK 345"}
  cevap_dilekcesi: {days: 14, ref: "HMK 127"}

evidence_standard: "vicdani kanaat"
expert_lenses:
  - ticaret
  - is
  - tazminat
  - kisiler
  - esya
  - sozlesmeler
  - miras
  - fikri_sinai
  - haksiz_rekabet
  - marka
  - patent
  - deniz_ticareti
  - kira
  - bilisim
  - tuketici
  - saglik
  - sigorta
  - spor
  - enerji
  - insaat
analysis_focus:
  - hukuki_sorun
  - unsurlar
  - somut_olay_eslestirmesi
  - gorev_yetki
  - sureler
system_prompt_persona: |
  Kıdemli özel hukuk avukatı, Yargıtay Hukuk Genel Kurulu perspektifi ve hukuk profesörü lensiyle çalış.
  Soruda algılanan alt hukuk dalının kendi profesörü gibi davran; birden fazla alan varsa ilgili uzman lenslerini birlikte kullan.
  Haksız rekabet hukukunu rekabet hukukundan ayır; mevzuat, içtihat, doktrin, süre, görev ve yetkiyi kaynaklarıyla göster.
response_tone: "resmi, temkinli, atıf-odaklı"
disclaimer_required: true

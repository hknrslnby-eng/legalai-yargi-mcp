services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_PASSWORD: legalai
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  qdrant:
    image: qdrant/qdrant:latest
    volumes: [qdrant:/qdrant/storage]
    ports: ["6333:6333"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  meilisearch:
    image: getmeili/meilisearch:latest
    environment:
      MEILI_MASTER_KEY: dev-key
    volumes: [meili:/meili_data]
    ports: ["7700:7700"]

  legalai-mcp:
    build: .
    env_file: .env
    depends_on: [postgres, qdrant, redis, meilisearch]
    ports: ["8080:8000"]

volumes:
  pgdata: {}
  qdrant: {}
  meili: {}

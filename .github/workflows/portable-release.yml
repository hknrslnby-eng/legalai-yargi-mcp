name: SocratLegal portable release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform_tag }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform_tag: windows-x64
            runtime_archive: uv-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify release version
        shell: pwsh
        run: python scripts/check_release_version.py "${{ github.ref_name }}"
      - name: Download bundled uv (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          UV_VERSION: "0.11.28"
        run: |
          New-Item -ItemType Directory -Force -Path runtime-download | Out-Null
          Invoke-WebRequest "https://github.com/astral-sh/uv/releases/download/${env:UV_VERSION}/${{ matrix.runtime_archive }}" -OutFile runtime-download/uv.zip
          Expand-Archive runtime-download/uv.zip -DestinationPath runtime-download/extracted -Force
          $uv = Get-ChildItem runtime-download/extracted -Recurse -Filter uv.exe | Select-Object -First 1
          Copy-Item $uv.FullName runtime-download/uv.exe
      - name: Run installer preflight tests
        shell: pwsh
        run: |
          & ".\runtime-download\uv.exe" sync --frozen --dev
          & ".\runtime-download\uv.exe" run pytest legalai/tests/installer legalai/tests/apps -q
      - name: Build portable archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          python scripts/package_portable.py --source . --output dist --platform-tag "${{ matrix.platform_tag }}" --version $version --runtime runtime-download/uv.exe --release-url "https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/socratlegal-*
            dist/release-manifest-*.json
